<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/fromann/CDN@main/img/logo.ico">
  <title>唯一</title>
  <script src="https://cdn.jsdelivr.net/gh/zyoushuo/Blog/hexo/js/mouse_slide.js"></script>
  <script src="clicklove.js"></script>
  <style type="text/css">
    html, body {
      height: 100%;
      padding: 0;
      margin: 0;
      background: #000;
      overflow: hidden;
      perspective: 1000px;
    }
    .bg-container{
      position:fixed;inset:0;
      z-index:1;
    }
    .bg-slide{
      position:absolute;inset:0;
      background-size:cover;
      background-position:center;
      opacity:0;
      transition:opacity 1.5s ease-in-out;
    }
    .bg-slide.active{
      opacity:1;
    }
    .overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,0.4);
      z-index:2;
    }
    canvas {
      position: absolute;
      width: 1200px;
      height: 1000px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index:3;
    }
    .namebox{
      color: #fff;
      position: absolute;
      top: 50%;
      left: 50%;
      -webkit-transform: translate(-50%, -50%);
      -moz-transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
      -o-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      z-index:4;
      cursor: pointer;
    }
    .namebox h1{
      margin: 0 auto;
      font-size:clamp(40px,15vw,80px);
      font-weight:bold;
      text-align:center;
      animation:titleFloat 4s infinite alternate,textGlow 3s ease-in-out infinite;
    }
    .namebox h1 span{
      display:inline-block;
      animation:shine 3s infinite ease-in-out;
    }
    .namebox h1 span:nth-child(1){animation-delay:0s;}
    .namebox h1 span:nth-child(2){animation-delay:0.2s;}
    @keyframes titleFloat{0%{transform:translateY(0);}100%{transform:translateY(-10px);}}
    @keyframes textGlow{0%,100%{filter:drop-shadow(0 0 10px rgba(255,180,220,0.6));}50%{filter:drop-shadow(0 0 20px rgba(255,150,200,0.8));}}
    @keyframes shine{0%,100%{color:#fff5e6;}50%{color:#ffdd99;}}
    @keyframes neon{0%,100%{text-shadow:0 0 10px #fff,0 0 20px #ff6b9d,0 0 30px #ff6b9d;}50%{text-shadow:0 0 20px #fff,0 0 40px #ff6b9d,0 0 60px #ff6b9d;}}
    @keyframes rainbow{0%{color:#ff6b9d;}25%{color:#a8e6cf;}50%{color:#ffd93d;}75%{color:#b39ddb;}100%{color:#ff6b9d;}}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
    
    /* 3D相册样式 - 正方体魔方 */
    .album-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      perspective: 1500px;
      z-index: 5;
    }
    
    .album {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: rotate 30s linear infinite;
    }
    
    .album-face {
      position: absolute;
      width: 200px;
      height: 200px;
      backface-visibility: visible;
      border: 2px solid rgba(135, 206, 235, 0.5);
      box-shadow: 0 0 15px rgba(135, 206, 235, 0.3);
    }
    
    .album-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* 正方体六个面 */
    .face-front {
      transform: translateZ(100px);
    }
    
    .face-back {
      transform: rotateY(180deg) translateZ(100px);
    }
    
    .face-right {
      transform: rotateY(90deg) translateZ(100px);
    }
    
    .face-left {
      transform: rotateY(-90deg) translateZ(100px);
    }
    
    .face-top {
      transform: rotateX(90deg) translateZ(100px);
    }
    
    .face-bottom {
      transform: rotateX(-90deg) translateZ(100px);
    }
    
    /* 额外的小正方体 */
    .album-container-2 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      perspective: 1500px;
      z-index: 6;
    }
    
    .album-2 {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: rotate 30s linear infinite reverse;
    }
    
    .album-face-2 {
      position: absolute;
      width: 100px;
      height: 100px;
      backface-visibility: visible;
      border: 2px solid rgba(135, 206, 235, 0.5);
      box-shadow: 0 0 10px rgba(135, 206, 235, 0.3);
    }
    
    .album-face-2 img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* 小正方体六个面 */
    .album-container-2 .face-front {
      transform: translateZ(50px) !important;
    }
    
    .album-container-2 .face-back {
      transform: rotateY(180deg) translateZ(50px) !important;
    }
    
    .album-container-2 .face-right {
      transform: rotateY(90deg) translateZ(50px) !important;
    }
    
    .album-container-2 .face-left {
      transform: rotateY(-90deg) translateZ(50px) !important;
    }
    
    .album-container-2 .face-top {
      transform: rotateX(90deg) translateZ(50px) !important;
    }
    
    .album-container-2 .face-bottom {
      transform: rotateX(-90deg) translateZ(50px) !important;
    }
    
    @keyframes rotate {
      0% { transform: rotateX(0deg) rotateY(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }
  </style>

</head>
<body>
<audio id="bgMusic" autoplay loop volume="0.3" preload="auto">
  <source src="./123.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>
<div class="bg-container" id="bgContainer"></div>
<div class="overlay"></div>
<canvas id="pinkboard"></canvas>

<!-- 3D相册 - 大正方体 -->
<div class="album-container">
  <div class="album" id="album">
    <!-- 相册面将通过JavaScript动态添加 -->
  </div>
</div>

<!-- 3D相册 - 小正方体 -->
<div class="album-container-2">
  <div class="album-2" id="album2">
    <!-- 相册面将通过JavaScript动态添加 -->
  </div>
</div>

<script>
  var settings = {
    particles: {
      length: 1500, // maximum amount of particles
      duration: 3, // particle duration in sec
      velocity: 80, // particle velocity in pixels/sec
      effect: -0.8, // play with this for a nice effect
      size: 25, // particle size in pixels
    },
  };
  (
          function(){
            var b=0;
            var c=["ms","moz","webkit","o"];
            for(var a=0;a<c.length&&!window.requestAnimationFrame;++a){
              window.requestAnimationFrame=window[c[a]+"RequestAnimationFrame"];
              window.cancelAnimationFrame=window[c[a]+"CancelAnimationFrame"]||window[c[a]+"CancelRequestAnimationFrame"]
            }
            if(!window.requestAnimationFrame){
              window.requestAnimationFrame=function(h,e){
                var d=new Date().getTime();
                var f=Math.max(0,16-(d-b));
                var g=window.setTimeout(function(){h(d+f)},f);b=d+f;return g}}if(!window.cancelAnimationFrame){window.cancelAnimationFrame=function(d){clearTimeout(d)}}}());
  var Point = (function() {
    function Point(x, y) {
      this.x = (typeof x !== 'undefined') ? x : 0;
      this.y = (typeof y !== 'undefined') ? y : 0;
    }
    Point.prototype.clone = function() {
      return new Point(this.x, this.y);
    };
    Point.prototype.length = function(length) {
      if (typeof length == 'undefined')
        return Math.sqrt(this.x * this.x + this.y * this.y);
      this.normalize();
      this.x *= length;
      this.y *= length;
      return this;
    };

    Point.prototype.normalize = function() {
      var length = this.length();
      this.x /= length;
      this.y /= length;
      return this;
    };
    return Point;
  })();

  var Particle = (function() {
    function Particle() {
      this.position = new Point();
      this.velocity = new Point();
      this.acceleration = new Point();
      this.age = 0;
    }
    Particle.prototype.initialize = function(x, y, dx, dy) {
      this.position.x = x;
      this.position.y = y;
      this.velocity.x = dx;
      this.velocity.y = dy;
      this.acceleration.x = dx * settings.particles.effect;
      this.acceleration.y = dy * settings.particles.effect;
      this.age = 0;
    };
    Particle.prototype.update = function(deltaTime) {
      this.position.x += this.velocity.x * deltaTime;
      this.position.y += this.velocity.y * deltaTime;
      this.velocity.x += this.acceleration.x * deltaTime;
      this.velocity.y += this.acceleration.y * deltaTime;
      this.age += deltaTime;
    };

    Particle.prototype.draw = function(context, image) {
      function ease(t) {
        return (--t) * t * t + 1;
      }
      var size = image.width * ease(this.age / settings.particles.duration);
      context.globalAlpha = 1 - this.age / settings.particles.duration;
      context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
    };
    return Particle;
  })();
  /*

  * ParticlePool class

  */
  var ParticlePool = (function() {
    var particles,
            firstActive = 0,
            firstFree = 0,
            duration = settings.particles.duration;
    function ParticlePool(length) {
// create and populate particle pool
      particles = new Array(length);
      for (var i = 0; i < particles.length; i++)
        particles[i] = new Particle();
    }
    ParticlePool.prototype.add = function(x, y, dx, dy) {
      particles[firstFree].initialize(x, y, dx, dy);
// handle circular queue
      firstFree++;
      if (firstFree == particles.length) firstFree = 0;
      if (firstActive == firstFree ) firstActive++;
      if (firstActive == particles.length) firstActive = 0;
    };
    ParticlePool.prototype.update = function(deltaTime) {
      var i;
// update active particles
      if (firstActive < firstFree) {
        for (i = firstActive; i < firstFree; i++)
          particles[i].update(deltaTime);
      }
      if (firstFree < firstActive) {
        for (i = firstActive; i < particles.length; i++)
          particles[i].update(deltaTime);
        for (i = 0; i < firstFree; i++)
          particles[i].update(deltaTime);
      }
// remove inactive particles
      while (particles[firstActive].age >= duration && firstActive != firstFree) {
        firstActive++;
        if (firstActive == particles.length) firstActive = 0;
      }
    };
    ParticlePool.prototype.draw = function(context, image) {
// draw active particles
      if (firstActive < firstFree) {
        for (i = firstActive; i < firstFree; i++)
          particles[i].draw(context, image);
      }
      if (firstFree < firstActive) {
        for (i = firstActive; i < particles.length; i++)
          particles[i].draw(context, image);
        for (i = 0; i < firstFree; i++)
          particles[i].draw(context, image);
      }
    };
    return ParticlePool;
  })();
  /*

  * Putting it all together

  */
  (function(canvas) {
    var context = canvas.getContext('2d'),
            particles = new ParticlePool(settings.particles.length),
            particleRate = settings.particles.length / settings.particles.duration, // particles/sec
            time;
// get point on heart with -PI <= t <= PI
    function pointOnHeart(t) {
      return new Point(
              280 * Math.pow(Math.sin(t), 3),
              230 * Math.cos(t) - 90 * Math.cos(2 * t) - 35 * Math.cos(3 * t) - 18 * Math.cos(4 * t) + 45
      );

    }

// creating the particle image using a dummy canvas

    var image = (function() {
      var canvas = document.createElement('canvas'),
              context = canvas.getContext('2d');
      canvas.width = settings.particles.size;
      canvas.height = settings.particles.size;
// helper function to create the path
      function to(t) {
        var point = pointOnHeart(t);
        point.x = settings.particles.size / 2 + point.x * settings.particles.size / 350;
        point.y = settings.particles.size / 2 - point.y * settings.particles.size / 350;
        return point;
      }
// create the path
      context.beginPath();
      var t = -Math.PI;
      var point = to(t);
      context.moveTo(point.x, point.y);
      while (t < Math.PI) {
        t += 0.01; // baby steps!
        point = to(t);
        context.lineTo(point.x, point.y);
      }
      context.closePath();
// create the fill
      context.fillStyle = '#87ceeb';
      // context.fillStyle = '#ea80b0';
      context.fill();
// create the image
      var image = new Image();
      image.src = canvas.toDataURL();
      return image;
    })();
// render that thing!
    function render() {
// next animation frame
      requestAnimationFrame(render);
// update time
      var newTime = new Date().getTime() / 1000,
              deltaTime = newTime - (time || newTime);
      time = newTime;
// clear canvas
      context.clearRect(0, 0, canvas.width, canvas.height);
// create new particles
      var amount = particleRate * deltaTime;
      for (var i = 0; i < amount; i++) {
        var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
        var dir = pos.clone().length(settings.particles.velocity);
        particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
      }
// update and draw particles
      particles.update(deltaTime);
      particles.draw(context, image);
    }
// handle (re-)sizing of the canvas
    function onResize() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
    }
    window.onresize = onResize;
// delay rendering bootstrap
    setTimeout(function() {
      onResize();
      render();
    }, 10);
  })(document.getElementById('pinkboard'));
</script>

<script>
const images=['242.jpg','243.jpg','248.jpg','249.jpg','250.jpg','251.jpg','253.jpg','254.jpg','255.jpg','256.jpg'];
let currentIdx=0;

function initSlideshow(){
  const container=document.getElementById('bgContainer');
  images.forEach((src,i)=>{
    const slide=document.createElement('div');
    slide.className='bg-slide'+(i===0?' active':'');
    slide.style.backgroundImage=`url('${src}')`;
    container.appendChild(slide);
  });
}

function nextSlide(){
  const slides=document.querySelectorAll('.bg-slide');
  slides[currentIdx].classList.remove('active');
  currentIdx=(currentIdx+1)%slides.length;
  slides[currentIdx].classList.add('active');
}

// 初始化3D相册 - 正方体
function init3DAlbum() {
  const album = document.getElementById('album');
  const album2 = document.getElementById('album2');
  
  const faceClasses = ['face-front', 'face-back', 'face-right', 'face-left', 'face-top', 'face-bottom'];
  const selectedImages = images.slice(0, 6);
  
  selectedImages.forEach((src, index) => {
    const face = document.createElement('div');
    face.className = 'album-face ' + faceClasses[index];
    
    const img = document.createElement('img');
    img.src = src;
    face.appendChild(img);
    
    album.appendChild(face);
  });
  
  const selectedImages2 = images.slice(6, 10);
  selectedImages2.push(images[0], images[1]);
  
  selectedImages2.forEach((src, index) => {
    const face = document.createElement('div');
    face.className = 'album-face-2 ' + faceClasses[index];
    
    const img = document.createElement('img');
    img.src = src;
    face.appendChild(img);
    
    album2.appendChild(face);
  });
}

initSlideshow();
init3DAlbum();
setInterval(nextSlide,5000);

// 确保音乐播放 - 监听用户交互
function playMusic() {
  const bgMusic = document.getElementById('bgMusic');
  if (bgMusic && bgMusic.paused) {
    bgMusic.play().catch(function(error) {
      console.log('Playback error:', error);
    });
  }
}

// 监听各种用户交互事件
window.addEventListener('click', playMusic);
window.addEventListener('touchstart', playMusic);
window.addEventListener('keydown', playMusic);
window.addEventListener('scroll', playMusic);

// 页面加载后尝试播放
window.addEventListener('load', function() {
  setTimeout(playMusic, 500);
});

// 双击播放/暂停音乐
const namebox=document.querySelector('.namebox');
const bgMusic=document.getElementById('bgMusic');

namebox.addEventListener('dblclick',function(){
  if(bgMusic.paused){
    bgMusic.play();
  }else{
    bgMusic.pause();
  }
});

// 单击更换字体和艺术效果
const title=document.querySelector('.namebox h1');
const effects=[
  {animation:'titleFloat 4s infinite alternate,textGlow 3s ease-in-out infinite',fontFamily:'Arial, sans-serif'},
  {animation:'neon 2s ease-in-out infinite, pulse 1s ease-in-out infinite',fontFamily:'"Comic Sans MS", cursive'},
  {animation:'rainbow 3s linear infinite, pulse 1.5s ease-in-out infinite',fontFamily:'Georgia, serif'},
  {animation:'textGlow 2s ease-in-out infinite, pulse 1s ease-in-out infinite',fontFamily:'"Times New Roman", serif'},
  {animation:'shine 2s ease-in-out infinite, titleFloat 3s infinite alternate',fontFamily:'Verdana, sans-serif'}
];
let currentEffect=0;

namebox.addEventListener('click',function(e){
  if(e.detail===1){ // 单击
    currentEffect=(currentEffect+1)%effects.length;
    title.style.animation=effects[currentEffect].animation;
    title.style.fontFamily=effects[currentEffect].fontFamily;
  }
});
</script>

<div class="namebox">
  <h1>
    <span>香</span>
    <span>泞</span>
  </h1>
</div>
</body>
</html>
